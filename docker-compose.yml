services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      API_URL: http://api:8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./logs:/app/logs

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./logs:/app/logs
